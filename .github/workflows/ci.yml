name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-southeast-1
  ECR_REPO: skyrouter-prod-backend

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Tests (runs on every push and PR)
  # ---------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: make test ENV=ci

  # ---------------------------------------------------------------------------
  # Job 2: Build + push image, then trigger deploy (main branch only)
  # ---------------------------------------------------------------------------
  build-and-deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest

    permissions:
      id-token: write  # required for OIDC
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          IMAGE: ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:${{ github.sha }}
        run: |
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

      - name: Trigger deploy in skyrouter-infra
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_REPO_PAT }}
          repository: Traezar/skyrouter-infra   # ← update org/name if different
          event-type: deploy-app
          client-payload: |
            {
              "service": "backend",
              "image_tag": "${{ github.sha }}",
              "actor": "${{ github.actor }}"
            }
