services:

  postgres:
    image: postgis/postgis:16-3.5
    platform: linux/amd64
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT_EXPOSE:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # app: live-reloading dev server via air
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    command: air -c .air.toml
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      PORT: ${PORT:-8080}
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - .:/app
      - go-modules:/root/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy

  # build: compile binary to ./bin/server on the host
  build:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    command: go build -o /output/server ./cmd/server
    volumes:
      - .:/app
      - ./bin:/output
      - go-modules:/root/go/pkg/mod

  # test: run full test suite against postgres
  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    command: go test -v ./...
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
    volumes:
      - .:/app
      - go-modules:/root/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy

  # migrate: run golang-migrate against postgres (pass subcommand: up | down -all)
  migrate:
    image: migrate/migrate
    entrypoint: ["migrate", "-path", "/migrations", "-database", "postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=${DB_SSLMODE:-disable}"]
    volumes:
      - ./migrations:/migrations
    depends_on:
      postgres:
        condition: service_healthy

  # job: run a named job against postgres (usage: make job JOB=fetch-waypoints)
  job:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    entrypoint: ["go", "run", "./cmd/job"]
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      WAYPOINTS_ENDPOINT: ${WAYPOINTS_ENDPOINT}
      WAYPOINTS_API_KEY: ${WAYPOINTS_API_KEY}
    volumes:
      - .:/app
      - go-modules:/root/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy

  # bobgen: generate Bob ORM models from live schema
  bobgen:
    image: golang:1.25-alpine
    working_dir: /app
    command: >
      sh -c "
        go install github.com/stephenafamo/bob/gen/bobgen-psql@latest &&
        printf \"psql:\\n  dsn: postgres://$$DB_USER:$$DB_PASSWORD@postgres:5432/$$DB_NAME?sslmode=$$DB_SSLMODE\\noutput: internal/models\\npkgname: models\\n\" > /tmp/bobgen.yaml &&
        /root/go/bin/bobgen-psql -c /tmp/bobgen.yaml
      "
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      GOPATH: /root/go
    volumes:
      - .:/app
      - go-modules:/root/go/pkg/mod
      - go-bin:/root/go/bin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  go-modules:
  go-bin:
